<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      background: linear-gradient(to right, pink, lightyellow);
      text-align: center;
      font-family: 'Cursive', sans-serif;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: red;
      font-size: 3em;
      margin-top: 50px;
    }
    p {
      font-size: 1.5em;
      color: purple;
      margin: 20px;
    }
    img {
      width: 250px;
      margin-top: 20px;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: gold;
      animation: fall 5s infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>
<body>
  <h1>Happy Birthday, Halima Sadia ❤️</h1>
  <p>Wishing you a very prosperous life filled with joy, love, and endless success. May this year bring you all the happiness you deserve!</p>
  <img src="avatar.png" alt="Birthday Avatar">

  <script>
    // Confetti effect
    for (let i = 0; i < 50; i++) {
      let confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * window.innerWidth + "px";
      confetti.style.background = ["red","blue","green","gold","purple"][Math.floor(Math.random()*5)];
      confetti.style.animationDuration = (Math.random()*3+2) + "s";
      document.body.appendChild(confetti);
    }

    // Birthday alert
    alert("Happy Birthday, Halima Sadia! 🎉");
  </script>
</body>
</html>
